services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      # 同一ネットワーク内のLangfuseコンテナ名を指定
      - LANGFUSE_HOST=http://langfuse:3000
    volumes:
      - ./config.yaml:/app/config.yaml
      # src配下のパッケージディレクトリごとマウント
      - ./src/ai_platform_litellm:/app/ai_platform_litellm
    ports:
      - "4000:4000"
    command: [ "--config", "/app/config.yaml", "--detailed_debug" ]

  mcp-server:
    # FastMCP(=MCPサーバー) を uv で起動する軽量コンテナ
    image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
    working_dir: /app
    volumes:
      # プロジェクト一式をマウント（pyproject.toml/uv.lock/src を利用）
      - ./:/app
      # 仮想環境は named volume に作ってホストを汚しにくくする
      - mcp_server_venv:/app/.venv
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5001:5001"
    # 起動時に依存解決→MCPサーバー起動
    command:
      - /bin/sh
      - -lc
      - |
          uv sync --frozen
          uv run -m ai_platform_litellm.mcp_server


networks:
  default:
    name: ai_platform_net
    external: true


volumes:
  mcp_server_venv: