services:
  sv-agent-server:
    build:
      # ビルドの基準点
      context: ${AI_PLATFORM_LIB:?AI_PLATFORM_LIBが未設定です}
      # 基準点から見たDockerfileのパス
      dockerfile: Dockerfile
    
    # --- ここから下は build の「中」ではなく「外」に書きます ---
    image: ai-platform-samplelib-base    
    working_dir: /app
    
    volumes:
      # ソースコードを同期（Dockerfile内の COPY を上書きして開発しやすくする）
      - "${AI_PLATFORM_LIB}:/app"
    
    environment:
      - PYTHONUNBUFFERED=1
      # .env ファイルの内容も環境変数として渡す（必要に応じて個別に指定しても良い）
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_KEY=${LLM_API_KEY:?LLM_API_KEYが未設定です}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - EXECUTOR_BASE_URL=${EXECUTOR_BASE_URL:-}

    ports:
      - "7201:7201"
    
    # 起動コマンド（uv run で安全にモジュール実行）
    command: ["uv", "run", "-m", "ai_platform_samplelib.application.super_visor.api.api_server"]

networks:
  default:
    name: ai_platform_net
    external: true