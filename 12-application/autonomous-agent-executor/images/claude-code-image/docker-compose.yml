services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-code-executor-image
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      # ホスト側の .env から値を渡す
      - ANTHROPIC_AUTH_TOKEN=${LLM_API_KEY}
      - ANTHROPIC_BASE_URL=${LLM_BASE_URL}
      - ANTHROPIC_MODEL=${LLM_MODEL}
    
    cap_add:
      # iptablesの初期化にネットワークスタックへのアクセスが必要なため
      - NET_ADMIN
    
networks:
  default:
    name: ai_platform_net
    external: true
