services:
  cline:
    build:
      context: .
      dockerfile: Dockerfile
    image: cline-executor-image
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      # ホスト側の .env から値を渡す
      - CLINE_API_PROVIDER=${CLINE_API_PROVIDER}
      - CLINE_API_KEY=${CLINE_API_KEY}
      - CLINE_API_BASE_URL=${CLINE_API_BASE_URL}
      - CLINE_MODEL_ID=${CLINE_MODEL_ID}

networks:
  default:
    name: ai_platform_net
    external: true
