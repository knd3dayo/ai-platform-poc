services:
  cline:
    build:
      context: .
      dockerfile: Dockerfile
    image: cline-executor-image
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      # ホスト側の .env から値を渡す
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}

networks:
  default:
    name: ai_platform_net
    external: true
