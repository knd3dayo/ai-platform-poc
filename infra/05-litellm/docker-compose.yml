services:
  litellm:
    restart: always
    image: ghcr.io/berriai/litellm:main-latest
    env_file:
      - .env

    volumes:
      - ./config.yaml:/app/config.yaml
      # src配下のパッケージディレクトリごとマウント
      - ./src/ai_platform_litellm:/app/ai_platform_litellm
    ports:
      - "4000:4000"
    command: [ "--config", "/app/config.yaml", "--detailed_debug" ]
    extra_hosts:
      - "localhost:host-gateway"

    networks:
      - ai_platform_internal
      - ai_platform_egress
  
networks:
  ai_platform_egress:
    external: true
  ai_platform_internal:
    external: true
