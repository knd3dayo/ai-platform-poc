# ai-chat-util overlay config for coding-agent-only verification

ai_chat_util_config:
  llm:
    provider: openai
    timeout_seconds: 60
    api_key: os.environ/LLM_API_KEY
    completion_model: poc-chat-model
    embedding_model: poc-embedding-model
    base_url: http://localhost:4000
    api_version: null

  mcp:
    mcp_config_path: "${HOME}/source/repos/ai-platform-poc/infra/31-ai-chat-util-mcp/mcp_servers.coding-only.json"
    custom_instructions_file_path: null
    working_directory: "${HOME}/source/repos/ai-platform-poc"
    extra_headers: null
    coding_agent_endpoint:
      mcp_server_name: coding-agent

  features:
    allow_outside_modifications: false
    use_custom_pdf_analyzer: false
    hitl_approval_tools: []

  logging:
    level: INFO
    file: null

  network:
    requests_verify: true
    ca_bundle: null

  office2pdf:
    libreoffice_path: null

coding_agent_util:
  backend:
    task_backend: process
  monitor:
    disable_detach_monitor: false
    detach_monitor_interval: 2.0
    debug_container: false
  paths:
    workspace_root: /tmp/coding_agent_tasks
    host_projects_root: /tmp/coding_agent_projects
  host:
    uid: null
    gid: null
  process:
    command: opencode run
  compose:
    directory: .
    file: docker-compose.yml
    service_name: executor-service
    command: ""
  logging:
    level: INFO