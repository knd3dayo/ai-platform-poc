services:
  # ネットワーク作成を目的としたサービス
  # `docker compose up` 実行時に ai_platform_net が確実に作成されるようにする
  # 兼: ローカル/同一Dockerネットワーク向けのHTTP(S)プロキシ
  squid:
    image: ubuntu/squid:latest
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    ports:
      - "3128:3128"

networks:
  default:
    name: ai_platform_net
    driver: bridge
