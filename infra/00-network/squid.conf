# Minimal Squid config for docker network proxy

http_port 3128

# Allow only minimum ports for web access
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Destination allowlist (minimum for OpenCode).
# NOTE: If you later need more egress (e.g. git clones, package installs),
# extend this allowlist deliberately.
acl allowed_opencode dstdomain .opencode.ai
acl allowed_openai dstdomain .openai.com

# Allow typical private ranges + localhost
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localhost src 127.0.0.1/32

# Deny everything except local/private ranges
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow only allowlisted destinations from local/private ranges
http_access allow localnet allowed_opencode
http_access allow localnet allowed_openai
http_access deny all

# Quiet defaults
coredump_dir /var/spool/squid
access_log /var/log/squid/access.log
cache_log /var/log/squid/cache.log
