services:
  libreoffice:
    image: lscr.io/linuxserver/libreoffice:latest
    container_name: libreoffice
    restart: always
    environment:
      - PUID=1000 # ホストのユーザーIDに合わせる
      - PGID=1000 # ホストのグループIDに合わせる
      - TZ=Asia/Tokyo
      - LC_ALL=ja_JP.UTF-8
      # - PASSWORD=password # 必要に応じてWebログインパスワードを設定
    volumes:
      - ${HOME}/data/libreoffice/config:/config # 設定ファイル保存用
      - ${HOME}/data/libreoffice/documents:/documents # 編集したいファイルの置き場
    ports:
      - 3020:3000 # HTTPアクセス用 (ブラウザで http://localhost:3000)
      - 3021:3001 # HTTPSアクセス用
    networks:
      - ai_platform_egress
      - ai_platform_internal
    shm_size: "1gb" # ブラウザ表示の安定化のために推奨

networks:
  ai_platform_egress:
    external: true
  ai_platform_internal:
    external: true