# ==================================================================
# Dify 1.13.0 Ultra-Slim Configuration (PoC Optimized)
# ==================================================================

x-shared-env: &shared-api-worker-env
  # --- 1. 外部インフラ接続 (01-postgres, 02-redis) ---
  DB_TYPE: postgresql
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  DB_DATABASE: dify
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: "myredissecret"
  CELERY_BROKER_URL: redis://:myredissecret@redis:6379/1
  
  # --- 2. コア設定 ---
  SECRET_KEY: ${SECRET_KEY:-sk-9f73s3ljTXVcMT3Blb3ljTqtsKiGHXVcMT3BlbkFJLK7U}
  DEPLOY_ENV: PRODUCTION
  VECTOR_STORE: none
  LANG: C.UTF-8
  LOG_LEVEL: INFO
  
  # --- 3. ストレージ設定 (Local File System) ---
  STORAGE_TYPE: opendal
  OPENDAL_SCHEME: fs
  OPENDAL_FS_ROOT: /app/api/storage
  
  # --- 4. サンドボックス & プロキシ連携 ---
  CODE_EXECUTION_ENDPOINT: http://sandbox:8194
  CODE_EXECUTION_API_KEY: dify-sandbox
  SSRF_PROXY_HTTP_URL: http://ssrf_proxy:3128
  SSRF_PROXY_HTTPS_URL: http://ssrf_proxy:3128
  
  # --- 5. プラグイン・内部API連携 ---
  PLUGIN_DAEMON_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
  PLUGIN_DAEMON_URL: http://plugin_daemon:5002
  DIFY_INNER_API_URL: http://api:5001
  DIFY_INNER_API_KEY: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1
  INNER_API_KEY_FOR_PLUGIN: QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1

services:
  # 権限修正用コンテナ
  init_permissions:
    image: busybox:latest
    command: chown -R 1001:1001 /app/api/storage
    volumes:
      - ${HOME}/data/dify/storage:/app/api/storage

  api:
    image: langgenius/dify-api:1.13.0
    restart: always
    environment: { <<: *shared-api-worker-env, MODE: api }
    depends_on:
      init_permissions: { condition: service_completed_successfully }
    volumes:
      - ${HOME}/data/dify/storage:/app/api/storage
    networks: [ssrf_proxy_network, default]

  worker:
    image: langgenius/dify-api:1.13.0
    restart: always
    environment: { <<: *shared-api-worker-env, MODE: worker }
    depends_on:
      init_permissions: { condition: service_completed_successfully }
    volumes:
      - ${HOME}/data/dify/storage:/app/api/storage
    networks: [ssrf_proxy_network, default]

  worker_beat:
    image: langgenius/dify-api:1.13.0
    restart: always
    environment: { <<: *shared-api-worker-env, MODE: beat }
    networks: [ssrf_proxy_network, default]

  web:
    image: langgenius/dify-web:1.13.0
    restart: always
    environment:
      CONSOLE_API_URL: ""
      APP_API_URL: ""
    networks: [default]

  sandbox:
    image: langgenius/dify-sandbox:0.2.12
    restart: always
    environment:
      API_KEY: dify-sandbox
      GIN_MODE: release
      SANDBOX_PORT: 8194
    volumes:
      - ${HOME}/data/dify/sandbox/dependencies:/dependencies
      - ${HOME}/data/dify/sandbox/conf:/conf
    networks: [ssrf_proxy_network]

  plugin_daemon:
    image: langgenius/dify-plugin-daemon:0.5.3-local
    restart: always
    environment:
      <<: *shared-api-worker-env
      DB_DATABASE: dify_plugin
      SERVER_PORT: 5002
      SERVER_KEY: lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi
      # --- これを追加：プラグインのリモートインストール先設定 ---
      PLUGIN_REMOTE_INSTALLING_HOST: 0.0.0.0
      PLUGIN_REMOTE_INSTALLING_PORT: 5003
    volumes:
      - ${HOME}/data/dify/plugin_daemon:/app/storage
    networks: [ssrf_proxy_network, default]

  ssrf_proxy:
    image: ubuntu/squid:latest
    restart: always
    volumes:
      - ./ssrf_proxy/squid.conf.template:/etc/squid/squid.conf.template
      - ./ssrf_proxy/docker-entrypoint.sh:/docker-entrypoint.sh
    networks: [ssrf_proxy_network, default]

  nginx:
    image: nginx:latest
    restart: always
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf.template:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/proxy.conf.template:/etc/nginx/proxy.conf:ro
    ports:
      - "8081:80"
    depends_on: [api, web, plugin_daemon]
    networks: [default]

networks:
  default:
    name: ai_platform_net
    external: true
  ssrf_proxy_network:
    driver: bridge
    internal: true