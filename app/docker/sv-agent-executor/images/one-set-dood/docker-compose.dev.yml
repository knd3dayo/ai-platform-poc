services:
  sv-autonomous-bundle:
    environment:
      # Use the repo's compose template so we can layer dev overrides.
      - COMPOSE_DIRECTORY=${HOST_REPO_ROOT:?set HOST_REPO_ROOT}/app/docker/autonomous-agent-executor/images/all-in-on-image
      # Multiple compose files via OS path separator ':' (Linux/macOS).
      - COMPOSE_FILE=docker-compose.yml:docker-compose.dev.yml
    volumes:
      # Path mirroring: make HOST_REPO_ROOT visible inside the bundle at the same absolute path.
      - ${HOST_REPO_ROOT:?set HOST_REPO_ROOT}:${HOST_REPO_ROOT:?set HOST_REPO_ROOT}:ro
