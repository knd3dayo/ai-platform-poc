services:
  cline:
    image: cline-executor-image
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - .:/workspace
    env_file:
      - .env
    
    cap_add:
      # iptablesの初期化にネットワークスタックへのアクセスが必要なため
      - NET_ADMIN
    
networks:
  default:
    name: ai_platform_net
    external: true
