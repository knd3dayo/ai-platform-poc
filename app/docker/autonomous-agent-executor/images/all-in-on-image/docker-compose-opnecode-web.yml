services:
  opencode-web-executor:
    image: all-in-one-code-executor-image
    command:
      - opencode
      - web
      - --hostname
      - ${OPENCODE_WEB_HOSTNAME:-0.0.0.0}
      - --port
      - ${OPENCODE_WEB_PORT:-4096}
    stdin_open: true
    tty: true
    working_dir: /workspace
    ports:
      - "4096:4096"
    volumes:
      - ${WORKSPACE:-./workspace}:/workspace
    environment:
      - USER_ID=${USER_ID:-1000}
      - GROUP_ID=${GROUP_ID:-1000}
    env_file:
      - .env
    cap_add:
      # iptablesの初期化にネットワークスタックへのアクセスが必要なため
      - NET_ADMIN
    
networks:
  default:
    name: ai_platform_net
    external: true
