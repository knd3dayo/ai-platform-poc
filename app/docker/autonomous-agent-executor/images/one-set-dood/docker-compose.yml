services:
  sv-autonomous-bundle:
    build:
      context: ../../../../..
      dockerfile: app/docker/autonomous-agent-executor/images/one-set-dood/Dockerfile
    image: sv-autonomous-bundle:dood-poc
    restart: unless-stopped
    ports:
      - "7101:7101"
    environment:
      # PoC固定: hostと同一絶対パスでミラーリングする
      - WORKSPACE_ROOT=/srv/ai_platform/workspaces
      - EXECUTOR_ALLOWED_WORKSPACE_ROOT=/srv/ai_platform/workspaces
      # 実行テンプレートはバンドル内に同梱（クライアント側docker composeが読む）
      - COMPOSE_DIRECTORY=/opt/ai-platform/autonomous-agent-executor/all-in-on-image
      - COMPOSE_FILE=docker-compose.yml
      - COMPOSE_SERVICE_NAME=all-in-one-code-executor
      # バンドルがrootで動く場合でも、生成物のownerをホストユーザーに寄せたい場合に指定
      # 例: HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose up -d
      - HOST_UID=${HOST_UID:-}
      - HOST_GID=${HOST_GID:-}
    volumes:
      # DoOD: host docker daemon access
      - /var/run/docker.sock:/var/run/docker.sock
      # 共有workspace: hostと同一パスでミラーリング
      - /srv/ai_platform/workspaces:/srv/ai_platform/workspaces
    networks:
      - ai_platform_internal
      - bundle_public

networks:
  ai_platform_internal:
    external: true
    name: ai_platform_internal

  # PoC用: ホストからの疎通確認（ports公開）を成立させるためのネットワーク。
  # 実行コンテナ(all-in-on-image)は引き続き ai_platform_internal のみ参加させる。
  bundle_public: {}
