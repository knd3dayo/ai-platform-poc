# Non-secret test config for OpenAI
ai_chat_util_config:
  llm:
    provider: openai
    completion_model: gpt-4o
    timeout_seconds: 300
    api_key: os.environ/LLM_API_KEY
    base_url: "http://localhost:4000"

  features:
    use_custom_pdf_analyzer: true
    mcp_tool_call_limit: 100

  # office2pdf:
    # LibreOfficeのパスを指定. OfficeファイルをPDFに変換するために使用されます.
    #libreoffice_path: "c:\\Program Files\\LibreOffice\\program\\soffice.exe"

  mcp:
    mcp_config_path: "mcp.json"

autonomous_agent_util:
    
  backend:
    # docker | compose | process | windows_process | linux_process
    # NOTE:
    # - `process` は実行環境に応じて Windows/Linux を自動判定します。
    # - `windows_process` / `linux_process` は強制指定です。
    # - `subprocess` は後方互換のため受け付けますが、`process` に統一してください。
    task_backend: docker

  monitor:
    disable_detach_monitor: false
    detach_monitor_interval: 2.0
    debug_container: false

  paths:
    workspace_root: /home/user/data/autonomous_agent_tasks
    host_projects_root: /home/user/data/workspace/projects
    # executor_allowed_workspace_root: /tmp
    # workspace_path_rewrites:
    #   - from: /srv/ai_platform/workspaces
    #     to: /workspaces

  host:
    uid: 1000
    gid: 1000

  process:
    # Example (override as needed):
    # - opencode:  opencode run
    # - codex:    codex ...
    # - claude:   claude ...
    command: opencode run

  compose:
    directory: /home/user/source/repos/ai-platform-poc/app/docker/coding-agent/images/all-in-one-image
    file: docker-compose.yml
    service_name: all-in-one-code-executor
    # Example:
    # command: opencode run
    command: "opencode run"

  logging:
    level: INFO
    # file: /tmp/autonomous-agent-util.log
